<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>REIMBURSEMENT FORM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html {
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #fdf2f8;
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
      }
      /* Custom scrollbar - pink theme */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #fce7f3;
      }
      ::-webkit-scrollbar-thumb {
        background: #f9a8d4;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ec4899;
      }

      /* Print Styles */
      @media print {
        @page {
          margin: 0.5cm;
          size: A4;
        }
        .no-print {
          display: none !important;
        }
        body {
          background-color: white !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
          padding: 0 !important;
          margin: 0 !important;
          overflow: visible !important;
        }
        #root {
          width: 100%;
          margin: 0;
          padding: 0;
        }
        /* Ensure layouts work in print */
        .flex-1 {
            flex: 1 1 auto;
            width: 100%;
        }
        /* Ensure inputs look like text when printed */
        input, select {
          background: transparent !important;
          border: none !important;
          box-shadow: none !important;
          appearance: none;
        }
        /* Hide scrollbars in print */
        * {
          overflow: visible !important;
        }
      }
      /* PDF export: hide no-print elements during capture */
      body.pdf-exporting .no-print {
        display: none !important;
      }
      /* PDF export: show full table (no horizontal clip) so right side is captured */
      body.pdf-exporting .overflow-x-auto {
        overflow-x: visible !important;
        overflow: visible !important;
      }
      /* PDF export: ensure all ancestors allow overflow so html2canvas captures full content */
      body.pdf-exporting .flex-1,
      body.pdf-exporting main,
      body.pdf-exporting #root,
      body.pdf-exporting .min-w-0 {
        overflow: visible !important;
      }
      /* PDF export: render form controls as plain text to avoid html2canvas clipping */
      body.pdf-exporting input,
      body.pdf-exporting select,
      body.pdf-exporting textarea {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        appearance: none !important;
        -webkit-appearance: none !important;
        padding: 0 !important;
        margin: 0 !important;
        min-height: 0 !important;
        height: auto !important;
        line-height: 1.35 !important;
      }
      body.pdf-exporting input[type="date"]::-webkit-calendar-picker-indicator {
        display: none !important;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
      }
    }
    </script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
